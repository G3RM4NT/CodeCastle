<div class="auth-wrapper">
 
  <!-- Panel izquierdo -->
  <div class="auth-panel-left">
    <!-- Decorative shapes -->
    <div class="shape shape-top-right"></div>
    <div class="shape shape-bottom-left"></div>
    <div class="shape shape-mid"></div>
 
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="12" height="12" rx="3" fill="white" fill-opacity="0.9"/>
          <rect x="16" width="12" height="12" rx="3" fill="white" fill-opacity="0.6"/>
          <rect y="16" width="12" height="12" rx="3" fill="white" fill-opacity="0.6"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="white" fill-opacity="0.9"/>
        </svg>
      </div>
      <span class="brand-name">CodeCastle</span>
    </div>
 
    <div class="panel-content">
      <h2 class="panel-title">¡Bienvenido!</h2>
      <p class="panel-subtitle">Para mantenerte conectado con nosotros, inicia sesión con tu información personal.</p>
      <a routerLink="/login" class="btn-outline-white">INICIAR SESIÓN</a>
    </div>
  </div>
 
  <!-- Panel derecho -->
  <div class="auth-panel-right">
    <div class="form-container">
      <h1 class="form-title">Crear Cuenta</h1>
 
      <!-- Social buttons -->
      <div class="social-buttons">
        <button class="social-btn" type="button" title="Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
          </svg>
        </button>
        <button class="social-btn" type="button" title="Google">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <button class="social-btn" type="button" title="LinkedIn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </button>
      </div>
 
      <p class="divider-text">o usa tu correo para registrarte:</p>
 
      <!-- Form fields -->
      <div class="field-group">
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            [(ngModel)]="usuario.nombre"
            class="form-field"
            placeholder="Nombre completo"
          />
        </div>
 
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="usuario.email"
            class="form-field"
            placeholder="Correo electrónico"
          />
        </div>
 
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            type="password"
            [(ngModel)]="usuario.password"
            class="form-field"
            placeholder="Contraseña"
          />
        </div>
 
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <select [(ngModel)]="usuario.rol" class="form-field form-select-styled">
            <option value="" disabled selected>Rol de usuario</option>
            <option value="Vendedor">Vendedor (Acceso limitado)</option>
            <option value="Administrador">Administrador (Acceso total)</option>
          </select>
        </div>
      </div>
 
      <button class="btn-primary-solid" type="button" (click)="ejecutarRegistro()">
        REGISTRARSE
      </button>
    </div>
  </div>
 
</div>
