<div class="auth-wrapper">

  <!-- Panel izquierdo: Formulario de Login -->
  <div class="auth-panel-left">
    <div class="form-container">

      <div class="brand">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="#1a8fe3" fill-opacity="0.9"/>
          <rect x="16" width="12" height="12" rx="3" fill="#1a8fe3" fill-opacity="0.6"/>
          <rect y="16" width="12" height="12" rx="3" fill="#1a8fe3" fill-opacity="0.6"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="#1a8fe3" fill-opacity="0.9"/>
        </svg>
        <span class="brand-name">CodeCastle</span>
      </div>

      <h1 class="form-title">Iniciar Sesión</h1>

      <!-- Social buttons -->
      <div class="social-buttons">
        <button class="social-btn" type="button" title="Facebook">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
          </svg>
        </button>
        <button class="social-btn" type="button" title="Google">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <button class="social-btn" type="button" title="LinkedIn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </button>
      </div>

      <p class="divider-text">o usa tu cuenta de correo:</p>

      <!-- Fields -->
      <div class="field-group">
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            class="form-field"
            placeholder="Correo electrónico"
          />
        </div>

        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            class="form-field"
            placeholder="Contraseña"
          />
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <button class="btn-primary-solid" type="button" (click)="login()">
        INGRESAR
      </button>

    </div>
  </div>

  <!-- Panel derecho: Bienvenida + ir a Registro -->
  <div class="auth-panel-right">
    <div class="shape shape-top-left"></div>
    <div class="shape shape-bottom-right"></div>
    <div class="shape shape-mid"></div>

    <div class="panel-content">
      <h2 class="panel-title">¡Hola de nuevo!</h2>
      <p class="panel-subtitle">¿Aún no tienes una cuenta? Regístrate y empieza a usar CodeCastle hoy mismo.</p>
      <a routerLink="/registro" class="btn-outline-white">CREAR CUENTA</a>
    </div>
  </div>

</div>
