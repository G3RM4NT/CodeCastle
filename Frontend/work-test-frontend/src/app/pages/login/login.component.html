<div class="container mt-5">
  <div class="card p-4 col-md-4 mx-auto shadow">
    <h3 class="text-center">Login</h3>

    <input [(ngModel)]="email" name="email" class="form-control mb-2" placeholder="Email">
    <input [(ngModel)]="password" name="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100" (click)="login()">Ingresar</button>
  </div>
</div>
